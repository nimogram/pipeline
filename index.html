<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PIPELINE v11.14 - Mobile Square Debug</title>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        
        :root {
            --hpe-green: #01A982;
            --hpe-bg-front: #12171D;
            --solar-yellow: #FDE047;
        }

        body {
            background-color: #05070a; 
            font-family: 'JetBrains Mono', monospace;
            color: #e2e8f0;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
        }

        /* PRINT OPTIMIZATION (v11.14) */
        @media print {
            @page { size: A4 landscape; margin: 6mm; }
            body { background: white !important; color: black !important; overflow: visible !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .print-layout-grid { display: grid !important; grid-template-columns: 460px 1fr !important; gap: 20px; }
            .matrix-container-print { width: 440px !important; height: 440px !important; margin: 0 !important; border: 1px solid #000 !important; }
            .print-table th, .print-table td { font-size: 8px !important; border: 0.5px solid #000 !important; padding: 4px; }
            .bg-highlight-green { background-color: #f0fdf4 !important; }
            .bg-highlight-blue { background-color: #f0f9ff !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }

        .print-only { display: none; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        .balloon-active {
            box-shadow: 0 0 25px rgba(253, 224, 71, 0.7);
            border-color: #FDE047 !important;
            transform: scale(1.02);
            z-index: 100 !important;
        }

        .matrix-square-container {
            width: 100vw;
            height: 100vw;
            max-width: 100vh;
            max-height: 100vh;
            position: relative;
        }
    </style>
</head>
<body class="h-screen flex flex-col">
    <div id="root" class="flex-1 flex flex-col min-h-0"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const UNIT_VALUE = 1000000;
        const STATUS_ORDER = ["WON", "COMMIT", "COMMIT WITH RISK", "STRONG UPSIDE", "PIPELINE"];
        
        const STATUS_META = {
            WON:                { label: "WON", bg: "#00624E", accent: "#01A982" },
            COMMIT:             { label: "COMMIT", bg: "#01A982", accent: "#34D399" },
            "COMMIT WITH RISK": { label: "COMMIT W/RISK", bg: "#1e3a8a", accent: "#60a5fa" },
            "STRONG UPSIDE":    { label: "STRONG UPSIDE", bg: "#0ea5e9", accent: "#7dd3fc" },
            PIPELINE:           { label: "PIPELINE", bg: "#4b5563", accent: "#9ca3af" },
        };

        const MONTHS = ["11月","12月","1月","2月","3月","4月","5月","6月","7月","8月","9月","10月"];
        const Q_MAP  = { Q1:["11月","12月","1月"], Q2:["2月","3月","4月"], Q3:["5月","6月","7月"], Q4:["8月","9月","10月"] };
        const STORAGE_KEY = "hpe_pipeline_v11_14_mobile_sq";

        const fmt = (n) => `¥${(Number(n||0)/UNIT_VALUE).toLocaleString()}M`;

        const Ico = {
          Plus: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
          List: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
          Grid: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>,
          Down: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
          X:    () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
          Up:   () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
          Target: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
          Cloud: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.3-1.7-4.2-3.9-4.5-1-4.2-4.7-7-9.1-7-3.9 0-7.2 2.7-8 6.4C.4 10.3 0 11.3 0 12.5 0 15 2 17 4.5 17H5M12 12v9m-4-4l4 4 4-4"/></svg>,
        };

        const App = () => {
          const [deals, setDeals] = useState([]);
          const [quotas, setQuotas] = useState({ ALL: 800, Q1: 200, Q2: 200, Q3: 200, Q4: 200 });
          const [quarter, setQuarter] = useState("ALL");
          const [activeTab, setActiveTab] = useState("matrix");
          const [hoverId, setHoverId] = useState(null);
          const [showForm, setShowForm] = useState(false);
          const [showQuotaForm, setShowQuotaForm] = useState(false);
          const [editId, setEditId] = useState(null);
          const [form, setForm] = useState({ client: "", amount: "", status: "PIPELINE", month: "3月" });
          const [gasUrl, setGasUrl] = useState("https://script.google.com/macros/s/AKfycbwDHgk6TBz8UgNQ3W4HvGMLDMgVuuHrk6OokJ-bR73ek8cZNpNGpHPCSyQeSm-h8gMePw/exec");
          const [syncStatus, setSyncStatus] = useState({ loading: false, msg: "" });
          const fileRef = useRef(null);

          // Persistence
          useEffect(() => {
            try {
              const raw = localStorage.getItem(STORAGE_KEY);
              if (raw) {
                const d = JSON.parse(raw);
                if (d.deals) setDeals(d.deals);
                if (d.quotas) setQuotas(d.quotas);
                if (d.gasUrl) setGasUrl(d.gasUrl);
              }
            } catch (err) {}
          }, []);

          useEffect(() => {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ deals, quotas, gasUrl }));
          }, [deals, quotas, gasUrl]);

          const currentQuotaValue = useMemo(() => {
            if (quarter === "ALL") {
              return (Number(quotas.Q1 || 0) + Number(quotas.Q2 || 0) + Number(quotas.Q3 || 0) + Number(quotas.Q4 || 0));
            }
            return Number(quotas[quarter] || 0);
          }, [quotas, quarter]);

          const gridCfg = useMemo(() => (
            quarter === "ALL" ? { cols: 40, rows: 40, total: 1600 } : { cols: 30, rows: 20, total: 600 }
          ), [quarter]);

          const filtered = useMemo(() => (
            quarter === "ALL" ? deals : deals.filter(d => (Q_MAP[quarter] || []).includes(d.month))
          ), [deals, quarter]);

          const sortedDeals = useMemo(() => (
            [...filtered].sort((a, b) => STATUS_ORDER.indexOf(a.status) - STATUS_ORDER.indexOf(b.status) || (Number(b.amount || 0) - Number(a.amount || 0)))
          ), [filtered]);

          const gridData = useMemo(() => {
            const arr = Array(gridCfg.total).fill(null);
            let ptr = 0;
            sortedDeals.forEach((deal, si) => {
              const units = Math.max(1, Math.round(Number(deal.amount || 0) / UNIT_VALUE));
              for (let i = 0; i < units && ptr < gridCfg.total; i++, ptr++) {
                arr[ptr] = { ...deal, isStart: i === 0, units, sortIdx: si };
              }
            });
            return arr;
          }, [sortedDeals, gridCfg]);

          const stats = useMemo(() => {
            const qv = currentQuotaValue * UNIT_VALUE;
            const total = filtered.reduce((s, d) => s + Number(d.amount || 0), 0);
            
            let cum = 0;
            const byStatus = STATUS_ORDER.map(s => {
              const val = filtered.filter(d => d.status === s).reduce((sum, d) => sum + Number(d.amount || 0), 0);
              cum += val;
              return { 
                status: s, 
                val, 
                cumVal: cum, 
                cumPct: qv > 0 ? Math.round((cum / qv) * 100) : 0 
              };
            });

            return { 
                total, 
                achievement: qv > 0 ? Math.round((total / qv) * 100) : 0, 
                byStatus,
                qUnits: Math.round(currentQuotaValue) 
            };
          }, [filtered, currentQuotaValue]);

          const saveDeal = () => {
            const amt = Number(form.amount) * UNIT_VALUE;
            if (!form.client || isNaN(amt)) return;
            if (editId) setDeals(deals.map(d => d.id === editId ? { ...form, amount: amt, id: editId } : d));
            else setDeals([...deals, { ...form, amount: amt, id: Date.now().toString() }]);
            setEditId(null); setShowForm(false);
          };

          const handleImport = (e) => {
            const r = new FileReader();
            r.onload = ev => { 
                try {
                    const d = JSON.parse(ev.target.result); 
                    if (d.deals) setDeals(d.deals); 
                    if (d.quotas) setQuotas(d.quotas);
                } catch(e) {}
            };
            r.readAsText(e.target.files[0]);
          };

          // --- Improved Cloud Sync Logic with Detailed Logs ---
          const syncToCloud = async () => {
            if (!gasUrl) return setSyncStatus({ loading: false, msg: "URL REQUIRED" });
            setSyncStatus({ loading: true, msg: "REQUESTING..." });
            
            try {
              // POST with explicit payload structure
              const payload = JSON.stringify({ 
                deals, 
                quotas, 
                timestamp: new Date().toISOString(),
                clientSource: "MobileSquare-v11.14"
              });

              await fetch(gasUrl, {
                method: 'POST',
                mode: 'no-cors', 
                headers: { 'Content-Type': 'text/plain' }, 
                body: payload
              });
              
              setSyncStatus({ loading: false, msg: "SENT (CHECK SHEET)" });
            } catch (err) {
              setSyncStatus({ loading: false, msg: "SEND FAILED: " + err.message.substring(0,20) });
            }
            setTimeout(() => setSyncStatus({ loading: false, msg: "" }), 5000);
          };

          const loadFromCloud = async () => {
            if (!gasUrl) return setSyncStatus({ loading: false, msg: "URL REQUIRED" });
            setSyncStatus({ loading: true, msg: "FETCHING..." });
            
            try {
              const response = await fetch(gasUrl, { method: 'GET', cache: 'no-store' });
              
              if (!response.ok) throw new Error("HTTP " + response.status);
              
              const data = await response.json();
              if (data && data.deals) {
                setDeals(data.deals);
                if (data.quotas) setQuotas(data.quotas);
                setSyncStatus({ loading: false, msg: "LOAD SUCCESS (" + data.deals.length + ")" });
              } else {
                setSyncStatus({ loading: false, msg: "DATA EMPTY ON SHEET" });
              }
            } catch (err) {
              console.error(err);
              setSyncStatus({ loading: false, msg: "LOAD ERROR (CORS?)" });
            }
            setTimeout(() => setSyncStatus({ loading: false, msg: "" }), 5000);
          };

          const getQta = (month) => {
            for (const [q, months] of Object.entries(Q_MAP)) {
              if (months.includes(month)) return q;
            }
            return "-";
          };

          return (
            <div className="flex flex-col h-full overflow-hidden bg-black">
              
              {/* Header */}
              <header className="bg-black border-b border-[#01A98240] pt-4 pb-2 px-4 flex-shrink-0 z-50 no-print">
                <div className="flex justify-between items-center mb-3">
                  <div className="flex items-center gap-2">
                    <div className="w-6 h-6 bg-[#01A982] flex items-center justify-center rounded-sm shadow-lg shadow-[#01A982]/20"><Ico.Grid /></div>
                    <span className="text-[10px] font-black tracking-[0.2em] text-white uppercase">PIPELINE MOBILE</span>
                  </div>
                  <div className="flex gap-3">
                    <button onClick={() => fileRef.current.click()} className="p-2 text-gray-400 border border-white/10 rounded-sm active:bg-white/10" title="Import JSON"><Ico.Up /></button>
                    <input ref={fileRef} type="file" accept=".json" className="hidden" onChange={handleImport} />
                    <button onClick={() => window.print()} className="px-3 py-1 bg-white/5 text-white text-[10px] font-bold border border-white/20 rounded-sm uppercase tracking-tighter active:bg-white/10">PDF</button>
                  </div>
                </div>

                <div className="flex bg-[#0d1117] p-1 border border-white/10 rounded-sm mb-3 overflow-x-auto scrollbar-hide">
                  {["ALL", "Q1", "Q2", "Q3", "Q4"].map(q => (
                    <button key={q} onClick={() => setQuarter(q)} 
                      className={`flex-1 min-w-[60px] py-1.5 text-[11px] font-black transition-all rounded-sm ${quarter === q ? 'bg-[#01A982] text-white' : 'text-gray-500'}`}>
                      {q}
                    </button>
                  ))}
                </div>

                <div className="flex justify-between items-center px-1 mb-3">
                  <div className="flex flex-col">
                    <span className="text-[8px] text-gray-600 font-bold uppercase tracking-widest">Pipeline</span>
                    <span className="text-lg font-black text-[#01A982]">{fmt(stats.total)}</span>
                  </div>
                  
                  <button onClick={() => setShowQuotaForm(true)} className="flex flex-col items-center group active:scale-95 transition-transform">
                    <span className="text-[8px] text-gray-600 font-bold uppercase tracking-widest flex items-center gap-1">Quota <Ico.Target /></span>
                    <span className="text-lg font-black text-white group-hover:text-[#01A982] border-b border-transparent group-hover:border-[#01A982]">{fmt(currentQuotaValue*UNIT_VALUE)}</span>
                  </button>

                  <div className="flex flex-col items-end">
                    <span className="text-[8px] text-gray-600 font-bold uppercase tracking-widest">Achieved</span>
                    <span className="text-lg font-black text-white">{stats.achievement}%</span>
                  </div>
                </div>

                <div className="h-6 bg-black border border-white/5 flex overflow-hidden rounded-sm relative shadow-inner mb-1">
                  {stats.byStatus.map(s => s.val > 0 && (
                    <div key={s.status} 
                      style={{ width: `${(s.val / UNIT_VALUE / stats.qUnits) * 100}%`, background: STATUS_META[s.status].bg }} 
                      className="h-full border-r border-white/10 flex items-center justify-end px-2 group overflow-hidden"
                    >
                      <span className="text-[8px] font-black text-white whitespace-nowrap opacity-90 drop-shadow-md">
                        {s.cumPct}%
                      </span>
                    </div>
                  ))}
                  <div className="absolute top-0 right-0 h-full w-[2px] bg-white shadow-[0_0_10px_white] z-10"></div>
                </div>
              </header>

              {/* Dynamic Content */}
              <main className="flex-1 min-h-0 relative flex flex-col no-print">
                {activeTab === 'matrix' ? (
                  <div className="flex-1 flex flex-col items-center justify-start overflow-hidden pt-4">
                    <div className="matrix-square-container bg-[#0d1117] border-y border-white/10 p-[1px] gap-[1px] grid shadow-2xl"
                      style={{ 
                        gridTemplateColumns: `repeat(${gridCfg.cols}, 1fr)`, 
                        gridTemplateRows: `repeat(${gridCfg.rows}, 1fr)` 
                      }}>
                      {gridData.map((cell, i) => {
                        const isSelected = cell && hoverId === cell.id;
                        const isQuota = i < stats.qUnits;
                        return (
                          <div key={i} onClick={() => cell && setHoverId(hoverId === cell.id ? null : cell.id)}
                            className={`relative transition-all ${cell ? 'cursor-pointer' : 'tile-empty'} ${isSelected ? 'balloon-active' : ''}`}
                            style={{ 
                              backgroundColor: cell ? (isSelected ? "#FDE047" : STATUS_META[cell.status].bg) : (isQuota ? "#0f172a" : "#05070a"),
                              border: cell ? `1px solid ${isSelected ? "#FDE047" : STATUS_META[cell.status].bg + '44'}` : '1px solid rgba(255,255,255,0.02)'
                            }}>
                          </div>
                        );
                      })}
                    </div>

                    {hoverId && (
                      <div className="absolute top-1/2 left-0 w-full p-6 -translate-y-1/2 pointer-events-none">
                        <div className="bg-black/95 backdrop-blur-xl border-2 border-[#FDE047] p-6 shadow-[0_0_50px_rgba(253,224,71,0.4)] rounded-sm text-center">
                          {(() => {
                            const d = deals.find(x => x.id === hoverId);
                            if (!d) return null;
                            return (
                              <>
                                <div className="text-[10px] font-black text-[#FDE047] uppercase tracking-[0.4em] mb-1">Target Lock</div>
                                <div className="text-xl font-black text-white uppercase mb-2 truncate">{d.client}</div>
                                <div className="text-3xl font-black text-[#FDE047] mb-1">{fmt(d.amount)}</div>
                                <div className="text-[10px] font-bold text-gray-500 uppercase tracking-widest">
                                  {STATUS_META[d.status].label} · {d.month}
                                </div>
                                <div className="mt-4 pointer-events-auto">
                                    <button onClick={() => { setForm({ client: d.client, amount: String(Number(d.amount||0)/UNIT_VALUE), status: d.status, month: d.month }); setEditId(d.id); setShowForm(true); }}
                                      className="px-6 py-2 bg-white/10 text-white text-[10px] font-bold uppercase tracking-widest border border-white/20 rounded-full active:bg-white/20">Edit Details</button>
                                </div>
                              </>
                            );
                          })()}
                        </div>
                      </div>
                    )}
                  </div>
                ) : (
                  <div className="flex-1 overflow-y-auto bg-[#030508] p-4 pb-20 space-y-5 scrollbar-hide">
                    {STATUS_ORDER.map(s => {
                      const grp = filtered.filter(d => d.status === s).sort((a, b) => Number(b.amount || 0) - Number(a.amount || 0));
                      if (!grp.length) return null;
                      return (
                        <div key={s} className="space-y-2">
                          <div className="text-[10px] font-black text-gray-600 uppercase tracking-[0.2em] border-l-2 border-gray-800 pl-3">{STATUS_META[s].label}</div>
                          {grp.map(deal => (
                            <div key={deal.id} onClick={() => { setForm({ client: deal.client, amount: String(Number(deal.amount || 0) / UNIT_VALUE), status: deal.status, month: deal.month }); setEditId(deal.id); setShowForm(true); }} 
                              className="p-4 bg-white/[0.03] border border-white/5 flex items-center justify-between rounded-sm active:bg-white/10">
                              <div className="flex flex-col gap-1">
                                <span className="text-[14px] font-black text-white uppercase truncate w-40 tracking-tighter">{deal.client}</span>
                                <span className="text-[9px] text-gray-600 font-bold uppercase">{deal.month}</span>
                              </div>
                              <span className="text-[15px] text-[#01A982] font-black">{fmt(deal.amount)}</span>
                            </div>
                          ))}
                        </div>
                      );
                    })}
                  </div>
                )}
              </main>

              {/* Bottom Navigation */}
              <nav className="no-print bg-black border-t border-white/10 flex items-center justify-around h-20 px-6 pb-2 z-50">
                <button onClick={() => { setActiveTab('matrix'); setHoverId(null); }} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'matrix' ? 'text-[#01A982] scale-110' : 'text-gray-600'}`}>
                  <Ico.Grid />
                  <span className="text-[9px] font-black uppercase tracking-widest">Matrix</span>
                </button>

                <button onClick={() => { setEditId(null); setForm({ client: "", amount: "", status: "PIPELINE", month: "3月" }); setShowForm(true); }}
                  className="w-14 h-14 bg-[#01A982] text-white flex items-center justify-center rounded-full shadow-[0_0_30px_rgba(1,169,130,0.4)] active:scale-90 -translate-y-6 border-4 border-black">
                  <Ico.Plus />
                </button>

                <button onClick={() => setActiveTab('list')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'list' ? 'text-[#01A982] scale-110' : 'text-gray-600'}`}>
                  <Ico.List />
                  <span className="text-[9px] font-black uppercase tracking-widest">List</span>
                </button>
              </nav>

              {/* PDF Print Content */}
              <div className="print-only">
                <div className="flex justify-between items-end border-b-2 border-black mb-4 pb-2">
                  <h1 className="text-xl font-black uppercase tracking-[0.5em]">HPE Pipeline Inventory</h1>
                  <span className="text-[10px] font-bold text-gray-500 uppercase">Scope: {quarter} · Generated: {new Date().toLocaleDateString()}</span>
                </div>
                <div className="flex gap-10">
                   <div className="print-layout-grid flex-1">
                      <div className="matrix-container-print" 
                           style={{ 
                             display: "grid", 
                             gridTemplateColumns: `repeat(${gridCfg.cols}, 1fr)`, 
                             gridTemplateRows: `repeat(${gridCfg.rows}, 1fr)`, 
                             gap: "1px", 
                             background: "white" 
                           }}>
                        {gridData.map((cell, i) => (
                          <div key={i} style={{ 
                            backgroundColor: cell ? STATUS_META[cell.status].bg : (i < stats.qUnits ? "#f3f4f6" : "white"), 
                            border: "0.1px solid #eee",
                            aspectRatio: "1/1"
                          }}></div>
                        ))}
                      </div>
                   </div>
                   <div className="flex-1">
                      <table className="w-full border-collapse print-table">
                        <thead>
                          <tr className="bg-gray-100"><th align="left">Stage</th><th align="left">Identity</th><th align="right">Amount</th><th align="center">QTA</th><th align="center">Month</th></tr>
                        </thead>
                        <tbody>
                          {sortedDeals.map(d => (
                            <tr key={d.id} className={d.status === 'WON' || d.status === 'COMMIT' ? "bg-highlight-green" : (d.status === 'STRONG UPSIDE' ? "bg-highlight-blue" : "")}>
                              <td style={{ color: STATUS_META[d.status].bg, fontWeight: "bold" }}>{STATUS_META[d.status].label}</td>
                              <td>{d.client}</td>
                              <td align="right">{fmt(d.amount)}</td>
                              <td align="center">{getQta(d.month)}</td>
                              <td align="center">{d.month}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                   </div>
                </div>
              </div>

              {/* Modal: Settings & Quota Screen */}
              {showQuotaForm && (
                <div className="fixed inset-0 bg-black z-[2000] flex flex-col no-print animate-in fade-in duration-200">
                  <header className="px-6 py-6 border-b border-white/10 flex justify-between items-center">
                    <span className="text-[10px] font-black tracking-[0.5em] text-[#01A982] uppercase flex items-center gap-2"><Ico.Target /> Settings & Quota</span>
                    <button onClick={() => setShowQuotaForm(false)} className="text-gray-500 p-2 active:text-white"><Ico.X /></button>
                  </header>
                  <div className="flex-1 overflow-y-auto p-8 space-y-6 scrollbar-hide">
                    {/* Cloud Sync Section */}
                    <div className="bg-white/[0.03] border border-white/5 p-6 rounded-sm space-y-4">
                      <label className="text-[8px] font-black text-[#01A982] uppercase tracking-[0.2em] flex items-center gap-2"><Ico.Cloud /> Cloud Sync (GAS)</label>
                      <input 
                        type="text" 
                        value={gasUrl} 
                        onChange={e => setGasUrl(e.target.value)} 
                        placeholder="https://script.google.com/macros/s/.../exec"
                        className="w-full bg-black border border-white/10 p-4 text-[10px] font-mono text-white outline-none focus:border-[#01A982]" 
                      />
                      <div className="grid grid-cols-2 gap-4">
                        <button 
                          onClick={loadFromCloud} 
                          disabled={syncStatus.loading}
                          className="py-3 bg-white/5 text-white text-[10px] font-black border border-white/20 active:bg-white/10 disabled:opacity-50">
                          {syncStatus.loading && syncStatus.msg.includes("FETCH") ? "FETCHING..." : "LOAD FROM CLOUD"}
                        </button>
                        <button 
                          onClick={syncToCloud} 
                          disabled={syncStatus.loading}
                          className="py-3 bg-[#01A982]/20 text-[#01A982] text-[10px] font-black border border-[#01A982]/30 active:bg-[#01A982]/30 disabled:opacity-50">
                          {syncStatus.loading && syncStatus.msg.includes("SYNC") ? "SYNCING..." : "SAVE TO CLOUD"}
                        </button>
                      </div>
                      {syncStatus.msg && <div className="text-[10px] font-black text-center text-sky-400 uppercase tracking-[0.3em] bg-sky-900/20 py-3 rounded-sm border border-sky-500/30 animate-pulse">{syncStatus.msg}</div>}
                    </div>

                    <div className="bg-white/[0.03] border border-white/5 p-6 rounded-sm space-y-4">
                      <label className="text-[8px] font-black text-gray-500 uppercase tracking-[0.2em]">Full Year Target (Q1-Q4 Sum)</label>
                      <div className="flex items-center gap-4">
                        <div className="flex-1 bg-black/40 border border-white/5 p-5 text-2xl font-black text-[#01A982] shadow-inner">
                          {(Number(quotas.Q1||0) + Number(quotas.Q2||0) + Number(quotas.Q3||0) + Number(quotas.Q4||0)).toLocaleString()}
                        </div>
                        <span className="text-lg font-black text-gray-600">M</span>
                      </div>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        {["Q1", "Q2", "Q3", "Q4"].map(q => (
                          <div key={q} className="bg-white/[0.03] border border-white/5 p-4 rounded-sm space-y-2">
                            <label className="text-[8px] font-black text-gray-500 uppercase tracking-widest">{q} Target</label>
                            <div className="flex items-center gap-2">
                              <input type="number" value={quotas[q]} onChange={e => setQuotas({...quotas, [q]: Number(e.target.value)})} className="w-full bg-black border border-white/10 p-3 text-lg font-black text-white outline-none focus:border-[#01A982]" />
                              <span className="text-xs font-bold text-gray-700">M</span>
                            </div>
                          </div>
                        ))}
                    </div>
                    <div className="pt-6">
                        <button onClick={() => setShowQuotaForm(false)} className="w-full py-5 bg-[#01A982] text-white font-black text-lg uppercase tracking-widest shadow-xl active:scale-95 transition-transform">Update & Close</button>
                    </div>
                  </div>
                </div>
              )}

              {/* Modal: Opportunity Config */}
              {showForm && (
                <div className="fixed inset-0 bg-black z-[2000] flex flex-col no-print animate-in slide-in-from-bottom duration-300">
                  <header className="px-6 py-6 border-b border-white/10 flex justify-between items-center">
                    <span className="text-[10px] font-black tracking-[0.5em] text-[#01A982] uppercase">Opportunity Config</span>
                    <button onClick={() => setShowForm(false)} className="text-gray-500 p-2 active:text-white"><Ico.X /></button>
                  </header>
                  <div className="flex-1 overflow-y-auto p-8 space-y-8">
                    <div className="space-y-2">
                      <label className="text-[8px] font-black text-gray-600 uppercase tracking-widest">Client Identity</label>
                      <input value={form.client} onChange={e => setForm({ ...form, client: e.target.value })} className="w-full bg-[#0d1117] border border-white/10 p-5 text-lg font-black text-white outline-none focus:border-[#01A982] rounded-none shadow-inner" />
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        <div className="space-y-2">
                          <label className="text-[8px] font-black text-gray-600 uppercase tracking-widest">Amount (¥M)</label>
                          <input type="number" value={form.amount} onChange={e => setForm({ ...form, amount: e.target.value })} className="w-full bg-[#0d1117] border border-white/10 p-5 text-lg font-black text-white outline-none focus:border-[#01A982] rounded-none shadow-inner" />
                        </div>
                        <div className="space-y-2">
                          <label className="text-[8px] font-black text-gray-600 uppercase tracking-widest">Month</label>
                          <select value={form.month} onChange={e => setForm({ ...form, month: e.target.value })} className="w-full bg-[#0d1117] border border-white/10 p-5 text-lg font-black text-white outline-none appearance-none rounded-none">
                            {MONTHS.map(m => <option key={m} value={m} className="bg-black">{m}</option>)}
                          </select>
                        </div>
                    </div>
                    <div className="space-y-2">
                        <label className="text-[8px] font-black text-gray-600 uppercase tracking-widest">Confidence Level</label>
                        <select value={form.status} onChange={e => setForm({ ...form, status: e.target.value })} className="w-full bg-[#0d1117] border border-white/10 p-5 text-lg font-black text-white outline-none appearance-none rounded-none">
                          {STATUS_ORDER.map(s => <option key={s} value={s} className="bg-black">{s}</option>)}
                        </select>
                    </div>
                    <div className="pt-10 flex flex-col gap-4">
                        <button onClick={saveDeal} className="w-full py-5 bg-[#01A982] text-white font-black text-lg uppercase tracking-widest shadow-xl active:scale-95 transition-transform">DEPLOY POSITION</button>
                        {editId && (
                            <button onClick={() => { setDeals(deals.filter(d => d.id !== editId)); setShowForm(false); }} 
                              className="w-full py-4 text-rose-500 font-bold uppercase text-sm tracking-widest">Remove Opportunity</button>
                        )}
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
